﻿<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident - EventHive</title>
    <link rel="icon" type="image/svg" href="public/assets/images/logo-colored.svg?v=2">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Satisfy&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="src/styles/output.css">

    <style>
        /* ====== GLOBAL THEME TOKENS ====== */
        :root {
          --bg-overlay: rgba(255,255,255,0.72);
          --section-bg: rgba(255,255,255,0.6);
          --card-border: rgba(0,0,0,0.08);
          --text-primary: #1a1a2e;
          --text-secondary: rgba(20,20,40,0.6);
          --text-muted: rgba(20,20,40,0.4);
          --nav-bg: rgba(255,255,255,0.65);
          --nav-border: rgba(0,0,0,0.08);
          --article-bg: rgba(255,255,255,0.5);
          --article-border: rgba(0,0,0,0.06);
          --shadow: 0 8px 32px rgba(0,0,0,0.1);
          --dropdown-bg: rgba(255,255,255,0.92);
          --dropdown-border: rgba(0,0,0,0.1);
          --dropdown-hover: rgba(0,0,0,0.05);
          --footer-text: rgba(20,20,40,0.4);
          --input-bg-token: rgba(255,255,255,0.5);
          
          --eh-dark-glass: rgba(255, 255, 255, 0.65);
          --eh-dark-glass-light: rgba(255, 255, 255, 0.4);
          --eh-dark-glass-input: rgba(0, 0, 0, 0.05);
          --eh-white: #1a1a2e;
          --border-color: rgba(0, 0, 0, 0.1);
          --border-hover: rgba(0, 0, 0, 0.2);
          --btn-bg: rgba(0, 0, 0, 0.05);
          --btn-bg-hover: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
          --bg-overlay: rgba(10,15,20,0.80);
          --section-bg: rgba(10,15,20,0.85);
          --card-border: rgba(255,255,255,0.08);
          --text-primary: #ffffff;
          --text-secondary: rgba(255,255,255,0.6);
          --text-muted: rgba(255,255,255,0.4);
          --nav-bg: rgba(15,15,35,0.65);
          --nav-border: rgba(255,255,255,0.12);
          --article-bg: rgba(255,255,255,0.05);
          --article-border: rgba(255,255,255,0.08);
          --shadow: 0 20px 50px rgba(0,0,0,0.6);
          --dropdown-bg: rgba(20,25,35,0.96);
          --dropdown-border: rgba(255,255,255,0.12);
          --dropdown-hover: rgba(255,255,255,0.08);
          --footer-text: rgba(255,255,255,0.4);
          --input-bg-token: rgba(255,255,255,0.06);

          --eh-dark-glass: rgba(10, 15, 20, 0.85);
          --eh-dark-glass-light: rgba(10, 15, 20, 0.6);
          --eh-dark-glass-input: rgba(255, 255, 255, 0.05);
          --eh-white: #FFFFFF;
          --border-color: rgba(255, 255, 255, 0.08);
          --border-hover: rgba(255, 255, 255, 0.25);
          --btn-bg: rgba(255, 255, 255, 0.1);
          --btn-bg-hover: rgba(255, 255, 255, 0.2);
        }

        /* Profile Dropdown */
        .profile-wrapper { position: relative; }
        .profile-avatar {
          width: 40px; height: 40px; border-radius: 50%;
          border: 2px solid var(--card-border); cursor: pointer;
          background: var(--article-bg);
          display: flex; align-items: center; justify-content: center;
          overflow: hidden; transition: border-color 0.3s, box-shadow 0.3s;
        }
        .profile-avatar:hover { border-color: var(--text-primary); box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }
        .profile-avatar svg, .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-dropdown {
          position: absolute; top: calc(100% + 12px); right: 0; min-width: 200px;
          background: var(--dropdown-bg); border: 1px solid var(--dropdown-border);
          border-radius: 1rem; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
          backdrop-filter: blur(20px); padding: 0.5rem;
          opacity: 0; pointer-events: none; transform: translateY(-8px);
          transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100;
        }
        .profile-dropdown.open { opacity: 1; pointer-events: all; transform: translateY(0); }
        .dropdown-header { padding: 0.6rem 0.85rem; border-bottom: 1px solid var(--dropdown-border); margin-bottom: 0.4rem; }
        .dropdown-header p { margin: 0; font-size: 0.75rem; font-weight: 700; color: var(--text-primary); }
        .dropdown-header span { font-size: 0.65rem; color: var(--text-muted); }
        .dropdown-item {
          display: flex; align-items: center; gap: 0.65rem;
          padding: 0.6rem 0.85rem; border-radius: 0.6rem;
          font-size: 0.8rem; color: var(--text-primary); cursor: pointer;
          transition: background 0.2s; text-decoration: none; user-select: none;
        }
        .dropdown-item:hover { background: var(--dropdown-hover); }
        .dropdown-item svg { flex-shrink: 0; opacity: 0.6; }
        .dropdown-item.danger { color: #e53e3e; }
        .theme-toggle-row {
          display: flex; align-items: center; justify-content: space-between;
          padding: 0.5rem 0.85rem; border-radius: 0.6rem; cursor: pointer; transition: background 0.2s;
        }
        .theme-toggle-row:hover { background: var(--dropdown-hover); }
        .theme-toggle-label { display: flex; align-items: center; gap: 0.65rem; font-size: 0.8rem; color: var(--text-primary); }
        .theme-toggle-label svg { opacity: 0.6; }
        .toggle-switch { position: relative; width: 36px; height: 20px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; inset: 0; border-radius: 20px; background: rgba(0,0,0,0.15); transition: background 0.3s; cursor: pointer; }
        .toggle-slider:before { content: ''; position: absolute; width: 14px; height: 14px; border-radius: 50%; background: var(--text-primary); top: 3px; left: 3px; transition: transform 0.3s; }
        input:checked + .toggle-slider { background: rgba(0,0,0,0.35); }
        input:checked + .toggle-slider:before { transform: translateX(16px); }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--eh-white);
            background: transparent;
        }

        /* Dynamically overriding Tailwind white variables based on theme */
        .text-white { color: var(--eh-white) !important; }
        .text-white\/30 { color: color-mix(in srgb, var(--eh-white) 30%, transparent) !important; }
        .text-white\/40 { color: color-mix(in srgb, var(--eh-white) 40%, transparent) !important; }
        .text-white\/50 { color: color-mix(in srgb, var(--eh-white) 50%, transparent) !important; }
        .text-white\/70 { color: color-mix(in srgb, var(--eh-white) 70%, transparent) !important; }
        .bg-white\/5 { background-color: color-mix(in srgb, var(--eh-white) 5%, transparent) !important; }
        .border-white\/10 { border-color: color-mix(in srgb, var(--eh-white) 10%, transparent) !important; }

        /* Background */
        .bg-layer {
          position: fixed;
          inset: 0;
          z-index: -2;
          overflow: hidden;
        }
        .bg-layer img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          object-position: center center;
          display: block;
        }
        .bg-overlay {
          position: fixed;
          inset: 0;
          z-index: -1;
          background: var(--bg-overlay);
          transition: background 0.4s ease;
        }

        .satisfy-regular {
            font-family: "Satisfy", cursive;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--eh-dark-glass);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
        }

        .glass-card-light {
            background: var(--eh-dark-glass-light);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
        }

        /* Forms */
        .glass-input {
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--eh-white);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            outline: none;
            border-color: var(--border-hover);
            background: var(--eh-dark-glass-input);
        }
        .glass-input::placeholder {
            color: color-mix(in srgb, var(--eh-white) 40%, transparent);
        }

        select.glass-input option {
            background: var(--eh-dark-glass);
            color: var(--eh-white);
        }

        /* Buttons */
        .btn-glass {
            background: var(--btn-bg);
            backdrop-filter: blur(8px);
            color: var(--eh-white);
            font-weight: 700;
            padding: 1rem 3rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .btn-glass:hover:not(:disabled) {
            background: var(--btn-bg-hover);
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }
        .btn-glass:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Radio Blocks */
        .radio-block {
            border: 1px solid var(--border-color);
            background: var(--input-bg);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .peer:checked + .radio-block {
            border-color: var(--eh-white);
            background: var(--btn-bg-hover);
            box-shadow: 0 0 20px color-mix(in srgb, var(--eh-white) 10%, transparent);
        }

        .incident-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }
        
        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-backdrop.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-content {
            background: var(--eh-dark-glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 2.5rem;
            max-width: 600px;
            width: 90%;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.3s ease;
        }
        .modal-backdrop.active .modal-content {
            transform: translateY(0) scale(1);
        }

        /* Smooth Scroll */
        html { scroll-behavior: smooth; }
        
        /* Back button */
        .btn-back {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--eh-white);
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-back:hover {
            background: var(--btn-bg-hover);
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="bg-layer">
        <img id="bgImage" src="public/images/dark.avif" alt="Background">
    </div>
    <div class="bg-overlay"></div>

    <!-- Back Button & Header -->
    <div class="max-w-4xl mx-auto px-6 pt-10 pb-4 animate-fade-in flex items-center justify-between">
        <div class="flex items-center gap-4">
            <a href="/home" id="backBtn" class="btn-back rounded-full p-2" title="Back">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
                </svg>
            </a>
            <h1 class="satisfy-regular text-4xl">Report an Issue</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <li class="profile-wrapper" style="list-style:none;">
                <div class="profile-avatar" id="profileAvatarBtn" title="Account options">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-muted);">
                    <path fill-rule="evenodd" d="M18.685 19.097A9.723 9.723 0 0021.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 003.065 7.097A9.716 9.716 0 0012 21.75a9.716 9.716 0 006.685-2.653zm-12.54-1.285A7.486 7.486 0 0112 15a7.486 7.486 0 015.855 2.812A8.224 8.224 0 0112 20.25a8.224 8.224 0 01-5.855-2.438zM15.75 9a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" clip-rule="evenodd"/>
                  </svg>
                </div>
                <div class="profile-dropdown" id="profileDropdown">
                  <div class="dropdown-header">
                    <p id="dropdownName">User</p>
                    <span id="dropdownRole">Guest</span>
                  </div>
                  <div class="theme-toggle-row">
                    <div class="theme-toggle-label">
                      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                      </svg>
                      Dark Mode
                    </div>
                    <label class="toggle-switch">
                      <input type="checkbox" id="themeToggle" checked>
                      <span class="toggle-slider"></span>
                    </label>
                  </div>
                  <a class="dropdown-item" id="homeLink" href="/home">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                    Home
                  </a>
                  <div class="dropdown-item danger" id="logoutBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    Logout
                  </div>
                </div>
            </li>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 md:px-8 py-4 max-w-4xl pb-20">

        <form id="incident-form" class="glass-card overflow-hidden animate-fade-in">
            <div class="p-6 md:p-10 space-y-8">

                <!-- Section 1: Classification -->
                <section>
                    <h2 class="text-xl font-bold border-b border-white/10 pb-2 mb-6 flex items-center gap-2">
                        <span class="text-white/40 opacity-70">1.</span> Category
                    </h2>

                    <div class="grid md:grid-cols-2 gap-8">
                        <!-- Category -->
                        <div class="space-y-2">
                            <label for="category" class="block text-xs font-bold text-white/50 uppercase tracking-widest">Type <span class="text-red-400">*</span></label>
                            <div class="relative">
                                <select id="category" name="category" required class="glass-input block w-full rounded-2xl py-3 px-4 outline-none appearance-none cursor-pointer">
                                    <option value="" disabled selected>Select Category...</option>
                                    <option value="volunteer">Volunteer Issue</option>
                                    <option value="resource">Resource Shortage</option>
                                    <option value="task">Task Problem</option>
                                    <option value="safety">Safety Hazard</option>
                                    <option value="other">Other</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-white/40">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>

                        <!-- Specific Issue (Dynamic) -->
                        <div id="type-section" class="space-y-2 opacity-50 pointer-events-none transition-all duration-300">
                            <label for="type" class="block text-xs font-bold text-white/50 uppercase tracking-widest">Specific <span class="text-red-400">*</span></label>
                            <div class="relative">
                                <select id="type" name="type" required disabled class="glass-input block w-full rounded-2xl py-3 px-4 outline-none appearance-none cursor-pointer">
                                    <option value="" disabled selected>Select Category First...</option>
                                </select>
                                <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-white/40">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Hidden Input for Custom Type -->
                    <div id="type-input-container" class="hidden mt-4 animate-fade-in">
                        <label for="custom_type" class="block text-xs font-bold text-white/50 uppercase tracking-widest mb-2">Specify details <span class="text-red-400">*</span></label>
                        <input type="text" id="type-input" name="custom_type" placeholder="Describe the issue briefly..." class="glass-input block w-full rounded-2xl py-3 px-4 outline-none">
                    </div>
                </section>

                <!-- Section 2: Urgency -->
                <section>
                    <h2 class="text-xl font-bold border-b border-white/10 pb-2 mb-6 flex items-center gap-2">
                        <span class="text-white/40 opacity-70">2.</span> Priority
                    </h2>

                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <!-- Low -->
                        <label class="cursor-pointer relative group">
                            <input type="radio" name="severity" value="low" class="peer sr-only" required>
                            <div class="radio-block p-4 rounded-xl text-center">
                                <span class="block font-bold">Low</span>
                                <span class="text-[10px] text-white/40 uppercase tracking-wider">Can wait</span>
                            </div>
                        </label>
                        <!-- Medium -->
                        <label class="cursor-pointer relative group">
                            <input type="radio" name="severity" value="medium" class="peer sr-only">
                            <div class="radio-block p-4 rounded-xl text-center">
                                <span class="block font-bold">Medium</span>
                                <span class="text-[10px] text-white/40 uppercase tracking-wider">Note</span>
                            </div>
                        </label>
                        <!-- High -->
                        <label class="cursor-pointer relative group">
                            <input type="radio" name="severity" value="high" class="peer sr-only">
                            <div class="radio-block p-4 rounded-xl text-center">
                                <span class="block font-bold text-orange-400">High</span>
                                <span class="text-[10px] text-white/40 uppercase tracking-wider">Urgent</span>
                            </div>
                        </label>
                        <!-- Critical -->
                        <label class="cursor-pointer relative group">
                            <input type="radio" name="severity" value="critical" class="peer sr-only">
                            <div class="radio-block p-4 rounded-xl text-center">
                                <span class="block font-bold text-red-500">Critical</span>
                                <span class="text-[10px] text-white/40 uppercase tracking-wider">Immediate</span>
                            </div>
                        </label>
                    </div>
                </section>

                <!-- Section 3: Details -->
                <section>
                    <h2 class="text-xl font-bold border-b border-white/10 pb-2 mb-6 flex items-center gap-2">
                        <span class="text-white/40 opacity-70">3.</span> Details
                    </h2>

                    <div class="grid md:grid-cols-2 gap-8 mb-6">
                        <!-- Location -->
                        <div class="space-y-2">
                            <label for="location" class="block text-xs font-bold text-white/50 uppercase tracking-widest">Location/Area <span class="text-red-400">*</span></label>
                            <input type="text" id="location" name="location" placeholder="e.g. Stage Left, Food Court" required class="glass-input block w-full rounded-2xl py-3 px-4 outline-none">
                        </div>
                        <!-- Time -->
                        <div class="space-y-2">
                            <label for="timestamp" class="block text-xs font-bold text-white/50 uppercase tracking-widest">Time</label>
                            <input type="text" id="timestamp" name="timestamp" readonly class="block w-full rounded-2xl py-3 px-4 text-white/40 bg-white/5 border border-white/5 cursor-not-allowed outline-none">
                        </div>
                    </div>

                    <div class="space-y-2 mb-6">
                        <label for="description" class="block text-xs font-bold text-white/50 uppercase tracking-widest">Description <span class="text-red-400">*</span></label>
                        <textarea id="description" name="description" rows="4" placeholder="Describe the situation..." required class="glass-input block w-full rounded-2xl py-3 px-4 outline-none resize-y"></textarea>
                    </div>

                    <!-- File Upload -->
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-white/50 uppercase tracking-widest mb-2">Evidence (Optional)</label>
                        <div class="flex items-center gap-4">
                            <label class="glass-input cursor-pointer rounded-2xl px-6 py-4 flex items-center gap-3 w-max group border-dashed">
                                <div class="bg-white/10 p-2 rounded-full shadow-sm group-hover:bg-white/20 transition-colors">
                                    <svg class="w-5 h-5 text-white/70" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                                </div>
                                <span class="text-sm font-medium text-white/70">Attach Photo</span>
                                <input type="file" id="evidence" accept="image/*" capture="environment" class="hidden">
                            </label>

                            <!-- Preview -->
                            <div id="file-preview" class="hidden items-center gap-2 bg-white/10 px-4 py-3 rounded-xl">
                                <svg class="w-4 h-4 text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                <span id="filename" class="text-xs font-bold truncate max-w-[100px] text-white">file.jpg</span>
                                <button type="button" id="remove-file" class="ml-2 text-white/40 hover:text-red-400 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                            </div>
                        </div>
                    </div>
                </section>

                <hr class="border-white/10 my-4">

                <!-- Impact Assessment -->
                <section class="space-y-4">
                    <span class="block text-xs font-bold text-white/50 uppercase tracking-widest">Impact</span>
                    <div class="incident-grid">
                        <label class="glass-input flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5">
                            <input type="checkbox" name="impact" value="schedule" class="form-checkbox h-4 w-4 rounded bg-black/20 border-white/20 text-indigo-500">
                            <span class="text-sm font-medium">Schedule</span>
                        </label>
                        <label class="glass-input flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5">
                            <input type="checkbox" name="impact" value="attendees" class="form-checkbox h-4 w-4 rounded bg-black/20 border-white/20 text-indigo-500">
                            <span class="text-sm font-medium">Attendees</span>
                        </label>
                        <label class="glass-input flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5">
                            <input type="checkbox" name="impact" value="safety" class="form-checkbox h-4 w-4 rounded bg-black/20 border-white/20 text-indigo-500">
                            <span class="text-sm font-medium">Safety</span>
                        </label>
                        <label class="glass-input flex items-center gap-3 p-3 rounded-xl cursor-pointer hover:bg-white/5">
                            <input type="checkbox" name="impact" value="resources" class="form-checkbox h-4 w-4 rounded bg-black/20 border-white/20 text-indigo-500">
                            <span class="text-sm font-medium">Resources</span>
                        </label>
                    </div>
                </section>

                <!-- Actions -->
                <div class="flex flex-col md:flex-row items-center justify-end gap-4 pt-4">
                    <button type="button" id="reset-btn" class="px-6 py-2 rounded-full text-white/40 font-bold hover:bg-white/10 transition-colors w-full md:w-auto">Clear</button>
                    <button type="submit" id="submit-btn" disabled class="btn-glass w-full md:w-auto flex justify-center items-center gap-2">
                        <span>Submit Report</span>
                        <svg class="w-4 h-4 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                    </button>
                </div>
            </div>
        </form>

        <div class="text-center mt-6">
            <button id="report-system-issue-btn" class="text-[11px] text-white/30 uppercase tracking-widest hover:text-white transition-colors">
                Report System Issue / App Bug
            </button>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 z-50 transform translate-y-24 opacity-0 transition-all duration-300">
        <div class="glass-card shadow-2xl p-4 flex items-center pr-8 border-l-4 border-l-indigo-500">
            <div class="bg-indigo-500/20 rounded-full p-2 mr-4 text-indigo-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <div>
                <h4 class="font-bold text-white">Submitted</h4>
                <p class="text-xs text-white/50">Incident logged successfully.</p>
            </div>
        </div>
    </div>

    <!-- System Issue Modal -->
    <div id="system-issue-modal" class="modal-backdrop">
        <div class="modal-content">
            <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
               <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg> 
               Report System Issue
            </h3>
            <textarea id="system-issue-text" rows="4" class="glass-input block w-full rounded-2xl py-3 px-4 outline-none resize-none" placeholder="Describe the bug or technical issue..."></textarea>
            <div class="flex justify-end gap-3 mt-6">
                <button id="cancel-system-issue" class="px-6 py-2 text-sm font-bold text-white/50 hover:bg-white/10 rounded-xl transition-colors">Cancel</button>
                <button id="submit-system-issue" class="px-8 py-2 text-sm font-bold text-white bg-white/10 border border-white/20 hover:bg-white/20 rounded-xl transition-all">Submit</button>
            </div>
        </div>
    </div>

    <script src="src/js/report-incident.js"></script>
    <script>
      // Apply theme
      const bgImage = document.getElementById('bgImage');
      const themeToggle = document.getElementById('themeToggle');
      function applyTheme(isDark) {
          document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
          if (bgImage) bgImage.src = isDark ? 'public/images/dark.avif' : 'public/images/light.jpeg';
          if (themeToggle) themeToggle.checked = isDark;
          localStorage.setItem('theme', isDark ? 'dark' : 'light');
      }
      applyTheme(localStorage.getItem('theme') !== 'light');
      if (themeToggle) themeToggle.addEventListener('change', () => applyTheme(themeToggle.checked));

      // ── Profile Dropdown ──
      const avatarBtn = document.getElementById('profileAvatarBtn');
      const dropdown = document.getElementById('profileDropdown');
      const token = sessionStorage.getItem('token');

      avatarBtn.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('open'); });
      document.addEventListener('click', (e) => {
        if (!dropdown.contains(e.target) && e.target !== avatarBtn) dropdown.classList.remove('open');
      });

      // ── Logout ──
      document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.removeItem('token'); sessionStorage.removeItem('user');
        window.location.href = '/';
      });

      // ── Back button logic ──
      const urlParams = new URLSearchParams(window.location.search);
      const eId = urlParams.get('eventId');
      if (eId) {
          const backBtn = document.getElementById('backBtn');
          if (backBtn) backBtn.href = `/event-overview?id=${eId}`;
      }

      // ── Load user profile ──
      async function loadUserProfile() {
        if (!token) {
          showAccessDenied('You must be logged in as a volunteer to report an incident.');
          return;
        }
        try {
          const res = await fetch('/api/auth/profile', { headers: { Authorization: `Bearer ${token}` } });
          if (!res.ok) { showAccessDenied('Session expired. Please log in again.'); return; }
          const data = await res.json();
          const u = data.data;

          // Only volunteers can access this page
          if (u.role !== 'volunteer') {
            showAccessDenied('Only volunteers can report incidents.');
            return;
          }

          // Must have an eventId in the URL
          if (!eId) {
            showAccessDenied('No event specified. Please access this page from your event.');
            return;
          }

          // Check if volunteer has an approved application for this event
          const appRes = await fetch('/api/applications/my-applications', { headers: { Authorization: `Bearer ${token}` } });
          if (!appRes.ok) { showAccessDenied('Could not verify your event enrollment.'); return; }
          const appData = await appRes.json();
          const isApproved = appData.data?.some(a => a.eventId?._id === eId && a.status === 'approved');
          if (!isApproved) {
            showAccessDenied('You can only report incidents for events you are an approved volunteer in.');
            return;
          }

          const displayName = u.profile?.fullName || u.profile?.orgName || u.profile?.clientName || u.username;
          if (displayName) document.getElementById('dropdownName').textContent = displayName;
          document.getElementById('dropdownRole').textContent = 'Volunteer';

          const homeLink = document.getElementById('homeLink');
          homeLink.href = '/home';

          const pic = u.profile?.profilePic;
          if (pic) {
            const img = document.createElement('img');
            img.src = pic; img.alt = '';
            img.style.cssText = 'width:100%;height:100%;object-fit:cover;border-radius:50%;';
            img.onerror = () => { avatarBtn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" style="color:var(--text-muted)"><path fill-rule="evenodd" d="M18.685 19.097A9.723 9.723 0 0021.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 003.065 7.097A9.716 9.716 0 0012 21.75a9.716 9.716 0 006.685-2.653zm-12.54-1.285A7.486 7.486 0 0112 15a7.486 7.486 0 015.855 2.812A8.224 8.224 0 0112 20.25a8.224 8.224 0 01-5.855-2.438zM15.75 9a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z" clip-rule="evenodd"/></svg>`; };
            avatarBtn.innerHTML = ''; avatarBtn.appendChild(img);
          }
        } catch(e) {
          showAccessDenied('Something went wrong. Please try again.');
        }
      }

      function showAccessDenied(message) {
        const main = document.querySelector('main') || document.body;
        main.innerHTML = `
          <div style="min-height:60vh;display:flex;align-items:center;justify-content:center;padding:2rem;">
            <div style="max-width:420px;width:100%;text-align:center;">
              <div style="width:64px;height:64px;border-radius:50%;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;">
                <svg xmlns="http://www.w3.org/2000/svg" style="width:28px;height:28px;color:#f87171;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
                </svg>
              </div>
              <h2 style="font-family:'Satisfy',cursive;font-size:1.8rem;color:var(--text-primary);margin-bottom:.75rem;">Access Restricted</h2>
              <p style="color:var(--text-secondary);font-size:.9rem;margin-bottom:2rem;">${message}</p>
              <button onclick="history.back()" style="padding:.7rem 1.5rem;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:var(--text-primary);border-radius:.75rem;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;">Go Back</button>
            </div>
          </div>`;
      }

      loadUserProfile();
    </script>
</body>
</html>
