<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Event Details - EventHive</title>
    <link rel="icon" type="image/svg" href="public/assets/images/logo-colored.svg?v=2">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Satisfy&display=swap"

    <style>
        :root {
            --eh-dark-glass: rgba(255, 255, 255, 0.65);
            --eh-dark-glass-light: rgba(255, 255, 255, 0.4);
            --eh-dark-glass-input: rgba(0, 0, 0, 0.05);
            --eh-white: #1a1a2e;
            --bg-overlay: rgba(255, 255, 255, 0.72);
            --border-color: rgba(0, 0, 0, 0.1);
            --btn-enroll-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --eh-dark-glass: rgba(10, 15, 20, 0.85);
            --eh-dark-glass-light: rgba(10, 15, 20, 0.6);
            --eh-dark-glass-input: rgba(255, 255, 255, 0.05);
            --eh-white: #FFFFFF;
            --bg-overlay: rgba(10, 15, 20, 0.80);
            --border-color: rgba(255, 255, 255, 0.08);
            --btn-enroll-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--eh-white);
            background: transparent;
        }

        /* Dynamically overriding Tailwind white variables based on theme */
        .text-white { color: var(--eh-white) !important; }
        .text-white\/30 { color: color-mix(in srgb, var(--eh-white) 30%, transparent) !important; }
        .text-white\/40 { color: color-mix(in srgb, var(--eh-white) 40%, transparent) !important; }
        .text-white\/50 { color: color-mix(in srgb, var(--eh-white) 50%, transparent) !important; }
        .text-white\/60 { color: color-mix(in srgb, var(--eh-white) 60%, transparent) !important; }
        .text-white\/70 { color: color-mix(in srgb, var(--eh-white) 70%, transparent) !important; }
        .bg-white\/5 { background-color: color-mix(in srgb, var(--eh-white) 5%, transparent) !important; }
        .border-white\/10 { border-color: color-mix(in srgb, var(--eh-white) 10%, transparent) !important; }
        .hover\:text-white:hover { color: var(--eh-white) !important; }

        /* Background */
        .bg-layer {
          position: fixed;
          inset: 0;
          z-index: -2;
          overflow: hidden;
        }
        .bg-layer img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          object-position: center center;
          display: block; /* No backdrop filter on img */
        }
        .bg-overlay {
          position: fixed;
          inset: 0;
          z-index: -1;
          background: var(--bg-overlay);
          transition: background 0.4s ease;
        }

        .satisfy-regular {
            font-family: "Satisfy", cursive;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--eh-dark-glass);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
        }

        .glass-card-light {
            background: var(--eh-dark-glass-light);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
        }

        /* Info Chip */
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.85rem;
            border-radius: 9999px;
            background: var(--btn-enroll-bg);
            border: 1px solid var(--border-color);
            font-size: 0.7rem;
            font-weight: 500;
            color: color-mix(in srgb, var(--eh-white) 70%, transparent);
        }

        /* Tag */
        .event-tag {
            display: inline-block;
            padding: 0.3rem 0.75rem;
            border-radius: 9999px;
            background: var(--btn-enroll-bg);
            border: 1px solid var(--border-color);
            font-size: 0.65rem;
            font-weight: 600;
            color: color-mix(in srgb, var(--eh-white) 70%, transparent);
            letter-spacing: 0.02em;
        }

        /* Role Card */
        .role-card {
            background: color-mix(in srgb, var(--eh-white) 3%, transparent);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.25rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .role-card:hover {
            border-color: color-mix(in srgb, var(--eh-white) 25%, transparent);
            background: color-mix(in srgb, var(--eh-white) 6%, transparent);
            transform: translateY(-2px);
        }

        .role-card.selected {
            border-color: var(--eh-white);
            background: color-mix(in srgb, var(--eh-white) 10%, transparent);
            box-shadow: 0 0 20px color-mix(in srgb, var(--eh-white) 5%, transparent);
        }

        /* Section Divider */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--eh-white) 10%, transparent), transparent);
            margin: 2rem 0;
        }

        /* Enroll Button */
        .btn-enroll {
            background: var(--btn-enroll-bg);
            backdrop-filter: blur(8px);
            color: var(--eh-white);
            font-weight: 700;
            padding: 1rem 3rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-enroll:hover {
            background: color-mix(in srgb, var(--eh-white) 20%, transparent);
            border-color: color-mix(in srgb, var(--eh-white) 40%, transparent);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px color-mix(in srgb, var(--eh-white) 10%, transparent);
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--eh-dark-glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 2.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.3s ease;
        }

        .modal-backdrop.active .modal-content {
            transform: translateY(0) scale(1);
        }

        /* Social Link */
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: color-mix(in srgb, var(--eh-white) 6%, transparent);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            color: color-mix(in srgb, var(--eh-white) 50%, transparent);
            text-decoration: none;
        }

        .social-link:hover {
            background: color-mix(in srgb, var(--eh-white) 12%, transparent);
            color: var(--eh-white);
            border-color: color-mix(in srgb, var(--eh-white) 30%, transparent);
        }

        /* Back button */
        .btn-back {
            background: color-mix(in srgb, var(--eh-white) 4%, transparent);
            border: 1px solid var(--border-color);
            color: var(--eh-white);
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-back:hover {
            background: color-mix(in srgb, var(--eh-white) 8%, transparent);
        }

        /* Organizer avatar ring */
        .avatar-ring {
            border: 2px solid var(--border-color);
            border-radius: 50%;
            padding: 2px;
        }

        /* Stop text-white in specific classes */
        .text-white\/30 { color: color-mix(in srgb, var(--eh-white) 40%, transparent) !important; }
        .text-white\/40, .text-white\/50 { color: color-mix(in srgb, var(--eh-white) 60%, transparent) !important; }
        .text-white\/60 { color: color-mix(in srgb, var(--eh-white) 80%, transparent) !important; }
        .text-white { color: var(--eh-white) !important; }

        /* Fade in animation */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeSlideUp 0.6s ease-out both; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 1rem;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 5rem 2rem;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>

<body>

        <img id="bgImage" src="public/images/dark.avif" alt="Background">

    <script>
      // Apply theme early to prevent flash
      const savedTheme = localStorage.getItem('theme') || 'light';
      function applyTheme(isDark) {
          document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
          document.getElementById('bgImage').src = isDark ? 'public/images/dark.avif' : 'public/images/light.jpeg';
      }
      applyTheme(savedTheme === 'dark');
    </script>
    <script src="src/js/event-info.js"></script>

  <!-- EVENT CHAT -->
  <style>
    #event-chat-window{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;border-radius:1.5rem;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.7);border:1px solid rgba(255,255,255,0.1);background:#0d1117;width:360px;height:500px;transition:width .3s,height .3s,bottom .3s,right .3s,border-radius .3s;}
    #event-chat-window.minimized{height:52px;border-radius:1rem;}
    #event-chat-window.fullscreen{width:100vw!important;height:100vh!important;bottom:0!important;right:0!important;border-radius:0!important;}
    #event-chat-window.hidden-chat{display:none!important;}
    .event-chat-header{display:flex;align-items:center;gap:10px;padding:12px 16px;background:rgba(255,255,255,0.05);border-bottom:1px solid rgba(255,255,255,0.08);cursor:pointer;flex-shrink:0;user-select:none;}
    .event-chat-header-title{flex:1;font-size:.85rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .event-chat-header-sub{font-size:.65rem;color:rgba(255,255,255,0.4);}
    .event-chat-header-btn{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;padding:4px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:color .2s,background .2s;}
    .event-chat-header-btn:hover{color:#fff;background:rgba(255,255,255,0.1);}
    #event-chat-body{display:flex;flex:1;overflow:hidden;}
    .event-chat-sidebar{width:110px;flex-shrink:0;border-right:1px solid rgba(255,255,255,0.08);overflow-y:auto;background:rgba(0,0,0,0.2);padding:8px 4px;display:flex;flex-direction:column;gap:4px;}
    #event-chat-window.fullscreen .event-chat-sidebar{width:220px;}
    .event-chat-role-group{margin-bottom:8px;}

    .event-chat-participant{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:8px;cursor:default;}
    .event-chat-participant.organizer .event-chat-participant-avatar{background:linear-gradient(135deg,#3b82f6,#6366f1);}
    .event-chat-participant-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#8b5cf6,#ec4899);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.75rem;color:#fff;overflow:hidden;flex-shrink:0;}
    .event-chat-participant-name{font-size:.58rem;color:rgba(255,255,255,0.55);text-align:center;line-height:1.2;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .event-chat-main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .event-chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;}
    .event-chat-messages::-webkit-scrollbar{width:4px;}
    .event-chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px;}
    .event-chat-bubble{max-width:78%;padding:8px 12px;border-radius:14px;font-size:.8rem;line-height:1.4;word-break:break-word;}
    .event-chat-bubble.sent{align-self:flex-end;background:rgba(139,92,246,0.3);border:1px solid rgba(139,92,246,0.4);color:#ede9fe;border-bottom-right-radius:4px;}
    .event-chat-bubble.received{align-self:flex-start;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.85);border-bottom-left-radius:4px;}
    .event-chat-bubble-sender{font-size:.6rem;font-weight:700;color:rgba(255,255,255,0.45);margin-bottom:3px;}

    .event-chat-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:8px 12px;font-size:.8rem;color:#fff;outline:none;resize:none;font-family:inherit;}
    .event-chat-input:focus{border-color:rgba(139,92,246,0.5);}
    .event-chat-send-btn{background:rgba(139,92,246,0.3);border:1px solid rgba(139,92,246,0.4);color:#c4b5fd;border-radius:10px;padding:8px 12px;cursor:pointer;transition:background .2s;display:flex;align-items:center;}
    .event-chat-send-btn:hover{background:rgba(139,92,246,0.5);}
    #event-chat-fab{position:fixed;bottom:24px;right:24px;z-index:199;width:52px;height:52px;border-radius:50%;background:rgba(139,92,246,0.3);border:1px solid rgba(139,92,246,0.5);color:#c4b5fd;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,0.5);transition:background .2s,transform .2s;}
