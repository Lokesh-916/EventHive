<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Event Details - EventHive</title>
    <link rel="icon" type="image/svg" href="public/assets/images/logo-colored.svg?v=2">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Satisfy&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="src/styles/output.css">

    <style>
        :root {
            --eh-dark-glass: rgba(255, 255, 255, 0.65);
            --eh-dark-glass-light: rgba(255, 255, 255, 0.4);
            --eh-dark-glass-input: rgba(0, 0, 0, 0.05);
            --eh-white: #1a1a2e;
            --bg-overlay: rgba(255, 255, 255, 0.72);
            --border-color: rgba(0, 0, 0, 0.1);
            --btn-enroll-bg: rgba(0, 0, 0, 0.05);
        }

        [data-theme="dark"] {
            --eh-dark-glass: rgba(10, 15, 20, 0.85);
            --eh-dark-glass-light: rgba(10, 15, 20, 0.6);
            --eh-dark-glass-input: rgba(255, 255, 255, 0.05);
            --eh-white: #FFFFFF;
            --bg-overlay: rgba(10, 15, 20, 0.80);
            --border-color: rgba(255, 255, 255, 0.08);
            --btn-enroll-bg: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--eh-white);
            background: transparent;
        }

        /* Dynamically overriding Tailwind white variables based on theme */
        .text-white { color: var(--eh-white) !important; }
        .text-white\/30 { color: color-mix(in srgb, var(--eh-white) 30%, transparent) !important; }
        .text-white\/40 { color: color-mix(in srgb, var(--eh-white) 40%, transparent) !important; }
        .text-white\/50 { color: color-mix(in srgb, var(--eh-white) 50%, transparent) !important; }
        .text-white\/60 { color: color-mix(in srgb, var(--eh-white) 60%, transparent) !important; }
        .text-white\/70 { color: color-mix(in srgb, var(--eh-white) 70%, transparent) !important; }
        .bg-white\/5 { background-color: color-mix(in srgb, var(--eh-white) 5%, transparent) !important; }
        .border-white\/10 { border-color: color-mix(in srgb, var(--eh-white) 10%, transparent) !important; }
        .hover\:text-white:hover { color: var(--eh-white) !important; }

        /* Background */
        .bg-layer {
          position: fixed;
          inset: 0;
          z-index: -2;
          overflow: hidden;
        }
        .bg-layer img {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          object-fit: cover;
          object-position: center center;
          display: block; /* No backdrop filter on img */
        }
        .bg-overlay {
          position: fixed;
          inset: 0;
          z-index: -1;
          background: var(--bg-overlay);
          transition: background 0.4s ease;
        }

        .satisfy-regular {
            font-family: "Satisfy", cursive;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--eh-dark-glass);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--border-color);
            border-radius: 1.5rem;
        }

        .glass-card-light {
            background: var(--eh-dark-glass-light);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
        }

        /* Info Chip */
        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.85rem;
            border-radius: 9999px;
            background: var(--btn-enroll-bg);
            border: 1px solid var(--border-color);
            font-size: 0.7rem;
            font-weight: 500;
            color: color-mix(in srgb, var(--eh-white) 70%, transparent);
        }

        /* Tag */
        .event-tag {
            display: inline-block;
            padding: 0.3rem 0.75rem;
            border-radius: 9999px;
            background: var(--btn-enroll-bg);
            border: 1px solid var(--border-color);
            font-size: 0.65rem;
            font-weight: 600;
            color: color-mix(in srgb, var(--eh-white) 70%, transparent);
            letter-spacing: 0.02em;
        }

        /* Role Card */
        .role-card {
            background: color-mix(in srgb, var(--eh-white) 3%, transparent);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 1.25rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .role-card:hover {
            border-color: color-mix(in srgb, var(--eh-white) 25%, transparent);
            background: color-mix(in srgb, var(--eh-white) 6%, transparent);
            transform: translateY(-2px);
        }

        .role-card.selected {
            border-color: var(--eh-white);
            background: color-mix(in srgb, var(--eh-white) 10%, transparent);
            box-shadow: 0 0 20px color-mix(in srgb, var(--eh-white) 5%, transparent);
        }

        /* Section Divider */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--eh-white) 10%, transparent), transparent);
            margin: 2rem 0;
        }

        /* Enroll Button */
        .btn-enroll {
            background: var(--btn-enroll-bg);
            backdrop-filter: blur(8px);
            color: var(--eh-white);
            font-weight: 700;
            padding: 1rem 3rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-enroll:hover {
            background: color-mix(in srgb, var(--eh-white) 20%, transparent);
            border-color: color-mix(in srgb, var(--eh-white) 40%, transparent);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px color-mix(in srgb, var(--eh-white) 10%, transparent);
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-backdrop.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: var(--eh-dark-glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-color);
            border-radius: 2rem;
            padding: 2.5rem;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            transform: translateY(20px) scale(0.97);
            transition: transform 0.3s ease;
        }

        .modal-backdrop.active .modal-content {
            transform: translateY(0) scale(1);
        }

        /* Social Link */
        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: color-mix(in srgb, var(--eh-white) 6%, transparent);
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            color: color-mix(in srgb, var(--eh-white) 50%, transparent);
            text-decoration: none;
        }

        .social-link:hover {
            background: color-mix(in srgb, var(--eh-white) 12%, transparent);
            color: var(--eh-white);
            border-color: color-mix(in srgb, var(--eh-white) 30%, transparent);
        }

        /* Back button */
        .btn-back {
            background: color-mix(in srgb, var(--eh-white) 4%, transparent);
            border: 1px solid var(--border-color);
            color: var(--eh-white);
            padding: 0.6rem 1.2rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-back:hover {
            background: color-mix(in srgb, var(--eh-white) 8%, transparent);
        }

        /* Organizer avatar ring */
        .avatar-ring {
            border: 2px solid var(--border-color);
            border-radius: 50%;
            padding: 2px;
        }

        /* Stop text-white in specific classes */
        .text-white\/30 { color: color-mix(in srgb, var(--eh-white) 40%, transparent) !important; }
        .text-white\/40, .text-white\/50 { color: color-mix(in srgb, var(--eh-white) 60%, transparent) !important; }
        .text-white\/60 { color: color-mix(in srgb, var(--eh-white) 80%, transparent) !important; }
        .text-white { color: var(--eh-white) !important; }

        /* Fade in animation */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in { animation: fadeSlideUp 0.6s ease-out both; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        .delay-4 { animation-delay: 0.4s; }
        .delay-5 { animation-delay: 0.5s; }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 1rem;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 5rem 2rem;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>

<body>

    <!-- Background -->
    <div class="bg-layer">
        <img id="bgImage" src="public/images/dark.avif" alt="Background">
    </div>
    <div class="bg-overlay"></div>

    <!-- Back Button -->
    <div class="max-w-5xl mx-auto px-6 pt-8 pb-4 animate-in">
        <a href="/home" class="btn-back">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd"
                    d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                    clip-rule="evenodd" />
            </svg>
            Back to Events
        </a>
    </div>

    <!-- Rendered by JS -->
    <div id="event-root" class="pb-20"></div>

    <!-- Enrollment Modal -->
    <div id="enroll-modal" class="modal-backdrop">
        <div class="modal-content">
            <div class="flex items-center justify-between mb-6">
                <h2 class="satisfy-regular text-2xl">Select Your Role</h2>
                <button id="modal-close"
                    class="text-white/30 hover:text-white transition-colors text-2xl cursor-pointer">&times;</button>
            </div>
            <p class="text-xs text-white/40 mb-5">Choose a role you'd like to volunteer for. You can only select one
                role per event.</p>
            <div class="space-y-3 mb-6" id="modal-roles">
                <!-- populated by JS -->
            </div>
            <button id="btn-confirm-enroll" class="btn-enroll w-full opacity-40 pointer-events-none transition-all"
                disabled>Confirm Enrollment</button>
            <p id="enroll-hint" class="text-center text-[10px] text-white/30 mt-3">Select a role above to continue</p>
        </div>
    </div>

    <script>
      // Apply theme early to prevent flash
      const savedTheme = localStorage.getItem('theme') || 'light';
      function applyTheme(isDark) {
          document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
          document.getElementById('bgImage').src = isDark ? 'public/images/dark.avif' : 'public/images/light.jpeg';
      }
      applyTheme(savedTheme === 'dark');
    </script>
    <script src="src/js/event-info.js"></script>
</body>

</html>
